<!DOCTYPE html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Игровое лобби">
    <link rel="shortcut icon" href="t-games.svg" type="image/svg">
    <style>
        body {
            background-color: #000000;

            justify-content: center;
        }
        .item {
            margin: 10px;
            transition: transform 0.2s ease-in-out;
        }
        .item:hover {
            transform: scale(0.9);
        }
        img {
            border: 1px solid #fff;
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">
            <h1>Нарисуй платформер</h1>
            <a href="https://tagir-games.github.io/%D0%BD%D0%B0%D1%80%D0%B8%D1%81%D1%83%D0%B9-%D0%BF%D0%BB%D0%B0%D1%82%D1%84%D0%BE%D1%80%D0%BC%D0%B5%D1%80">
                <img src="Нарисуй платформер.svg" alt="Кнопка">

        </div>
        <div class="item">
            <h1>Avatar Editor</h1>
            <a href="https://tagir-games.github.io/avatar-editor">
                <img src="avatar editor.png" alt="Кнопка">
            </a>
        </div>
        <div class="item">
            <h1>Бег с препятствиями</h1>
            <a href="https://tagir-games.github.io/%D0%B1%D0%B5%D0%B3-%D1%81-%D0%BF%D1%80%D0%B5%D0%BF%D1%8F%D1%82%D1%81%D1%82%D0%B2%D0%B8%D1%8F%D0%BC%D0%B8">

            </a>
        </div>
        <div class="item">
            <h1>Нарисуй платформер 2</h1>
            <a href="https://tagir-games.github.io/%D0%BD%D0%B0%D1%80%D0%B8%D1%81%D1%83%D0%B9-%D0%BF%D0%BB%D0%B0%D1%82%D1%84%D0%BE%D1%80%D0%BC%D0%B5%D1%80">
                <img src="Нарисуй платформер.svg" alt="Кнопка">
            </a>
        </div>
    </div>
